
<!DOCTYPE html>
<html>
<head>
<title>PremiumHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:60px;
background:linear-gradient(120deg,#1e293b,#020617);
}

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
width:260px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 20px black;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:22px;
color:#22c55e;
margin:10px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<h1>PremiumHub</h1>
<p>Cheap Premium Subscriptions</p>

</header>

<div class="products">

<div class="card">

<img src="https://static.canva.com/web/images/canva-og-image.jpg">

<h2>Canva Pro</h2>

<p>1 Month Access</p>

<div class="price">₹99</div>

<button>Buy Now</button>

</div>

</div>

</body>
</html>
