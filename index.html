<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PremiumHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

header{
padding:80px;
background:linear-gradient(90deg,#1e293b,#020617);
}

.products{
display:flex;
justify-content:center;
padding:60px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:14px;
width:280px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 25px black;
}

.card img{
width:120px;
margin-bottom:15px;
}

.price{
font-size:22px;
color:#22c55e;
margin:10px;
}

button{
padding:12px 25px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>PremiumHub</h1>

<p>Cheap Premium Subscriptions</p>

</header>

<section class="products">

<div class="card">

<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg">

<h2>Canva Pro</h2>

<p>1 Month Access</p>

<div class="price">₹99</div>

<button onclick="buy()">Buy Now</button>

</div>

</section>

<script>

function buy(){
alert("Buy button works! Next step: add payment.");
}

</script>

</body>
</html>
